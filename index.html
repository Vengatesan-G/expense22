<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="app">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <i class="fa-solid fa-dollar-sign"></i>
                </div>

                <h1>ExpenseTracker</h1>
                <p>Welcome back! Please enter your details.</p>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label class="form-label" for="username">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="text" id="username" class="form-control" placeholder="Enter your email"
                                autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" class="form-control" placeholder="••••••••"
                                autocomplete="off">
                        </div>
                    </div>

                    <div class="form-group flex-between" style="margin-bottom: 1.5rem;">
                        <div class="checkbox-group">
                            <input type="checkbox" id="remember">
                            <label for="remember" style="font-size: 0.875rem; color: var(--text-secondary);">Remember
                                me</label>
                        </div>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-blue">
                        <span id="loginText">Login</span>
                        <div class="spinner" id="loginSpinner"></div>
                    </button>

                    <div id="loginError" class="error-msg">
                        Invalid email or password. Please try again.
                    </div>
                </form>

                <div style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-secondary);">
                    Don't have an account? <a href="#" class="signup-link">Sign up</a>
                </div>
            </div>
        </div>

        <div
            style="text-align: center; font-size: 0.75rem; color: #94a3b8; position: absolute; bottom: 1.5rem; width: 100%;">
            © 2023 ExpenseTracker Inc. All rights reserved.
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
